name: Build Linux with Nuitka

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -r libs.txt

      - name: Install system dependencies (for Nuitka)
        run: |
          sudo apt update
          sudo apt install -y patchelf gcc g++ make

      - name: Build Linux binary
        run: |
          python -m nuitka main.py \
            --standalone \
            --onefile \
            --enable-plugin=tk-inter \
            --include-package=pyttsx3 \
            --include-package-data=mediapipe \
            --include-data-dir=assets=assets \
            --assume-yes-for-downloads \
            --output-dir=build_output \
            --output-filename=SmartDriverMonitor

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-executable
          path: build_output/SmartDriverMonitor
          retention-days: 1